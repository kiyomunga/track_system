version: '3.8'

services:
  db:
    image: postgres:15
    container_name: track_db
    environment:
      POSTGRES_USER: track_user
      POSTGRES_PASSWORD: Hitotsubashi
      POSTGRES_DB: track_system_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
